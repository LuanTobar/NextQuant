# NATS Server Configuration for NexQuant

listen: 0.0.0.0:4222

# JetStream for persistent messaging
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 1GB
}

# WebSocket for browser clients
websocket {
  listen: "0.0.0.0:8222"
  no_tls: true
}

# HTTP monitoring
http_port: 8245

# Limits
max_payload: 1MB
max_connections: 1024
